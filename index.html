<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎤 Karaoké Night</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131c;
      --surface2: #1c1c2e;
      --border: #2a2a40;
      --accent: #ff3cac;
      --accent2: #784ba0;
      --accent3: #2b86c5;
      --text: #f0f0f5;
      --muted: #6b6b8a;
      --success: #00e5a0;
      --gradient: linear-gradient(135deg, #ff3cac, #784ba0, #2b86c5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(255,60,172,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(43,134,197,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(120,75,160,0.05) 0%, transparent 60%);
      animation: ambientShift 12s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes ambientShift {
      0% { transform: translate(0,0) rotate(0deg); }
      100% { transform: translate(-2%,-2%) rotate(2deg); }
    }
    .app { position: relative; z-index: 1; min-height: 100vh; }
    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

    /* WELCOME */
    #screen-welcome { text-align: center; gap: 32px; }
    .logo-area { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .mic-icon {
      width: 80px; height: 80px;
      background: var(--gradient);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      animation: pulse 2.5s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(255,60,172,0.3);
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 30px rgba(255,60,172,0.3); transform: scale(1); }
      50% { box-shadow: 0 0 60px rgba(255,60,172,0.5); transform: scale(1.05); }
    }
    .app-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 12vw, 90px);
      letter-spacing: 4px;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .app-subtitle { color: var(--muted); font-size: 15px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }
    .welcome-form { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 380px; }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-group label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .input-field {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      padding: 14px 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .input-field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,60,172,0.15); }
    .btn-primary {
      background: var(--gradient);
      border: none; border-radius: 12px;
      color: #fff; cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 15px; font-weight: 600;
      letter-spacing: 0.5px;
      padding: 16px 24px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      width: 100%;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,60,172,0.3); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ADMIN */
    #screen-admin { text-align: center; gap: 24px; }
    .admin-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      max-width: 400px; width: 100%;
      display: flex; flex-direction: column;
      gap: 20px; align-items: center;
    }
    .admin-icon { font-size: 48px; }
    .admin-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; }
    .admin-desc { color: var(--muted); font-size: 14px; line-height: 1.6; text-align: center; }
    .admin-badge {
      background: rgba(255,60,172,0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 6px 14px;
      text-transform: uppercase;
    }

    /* MAIN */
    #screen-main { justify-content: flex-start; padding: 0; min-height: 100vh; }
    .topbar {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(12px);
    }
    .topbar-brand { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 3px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .topbar-user { display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 36px; height: 36px; background: var(--gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; }
    .user-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .main-content { width: 100%; max-width: 680px; margin: 0 auto; padding: 32px 24px; display: flex; flex-direction: column; gap: 28px; }

    /* SEARCH */
    .search-section { display: flex; flex-direction: column; gap: 12px; }
    .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }
    .search-wrapper { position: relative; }
    .search-field {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      padding: 14px 18px 14px 48px;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .search-field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,60,172,0.15); }
    .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 18px; pointer-events: none; }
    .results-list { display: flex; flex-direction: column; gap: 8px; max-height: 340px; overflow-y: auto; }
    .results-list::-webkit-scrollbar { width: 4px; }
    .results-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .result-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      display: flex; align-items: center; gap: 14px;
      padding: 12px 16px;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
    .result-item:hover { border-color: var(--accent); background: var(--surface2); transform: translateX(2px); }
    .result-thumb { width: 60px; height: 42px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
    .result-info { flex: 1; min-width: 0; }
    .result-title { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .result-channel { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-add { background: var(--gradient); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 18px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.15s; }
    .result-add:hover { opacity: 0.85; transform: scale(1.05); }

    /* MANUAL */
    .manual-section { display: flex; flex-direction: column; gap: 12px; }
    .manual-form { display: flex; flex-direction: column; gap: 10px; }
    .btn-secondary { background: transparent; border: 1px solid var(--border); border-radius: 12px; color: var(--text); cursor: pointer; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; padding: 13px 20px; transition: border-color 0.2s, background 0.2s; width: 100%; }
    .btn-secondary:hover { border-color: var(--accent); background: rgba(255,60,172,0.05); }

    /* SONGS */
    .my-songs-section { display: flex; flex-direction: column; gap: 12px; }
    .songs-list { display: flex; flex-direction: column; gap: 8px; }
    .song-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; gap: 14px; padding: 12px 16px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .song-thumb { width: 50px; height: 36px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
    .song-info { flex: 1; min-width: 0; }
    .song-title { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .song-meta { font-size: 11px; color: var(--muted); }
    .song-status { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 500; flex-shrink: 0; }
    .song-status.adding { background: rgba(255,60,172,0.15); color: var(--accent); }
    .song-status.done { background: rgba(0,229,160,0.15); color: var(--success); }
    .song-status.error { background: rgba(255,80,80,0.15); color: #ff5050; }

    /* DIVIDER */
    .divider { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* TOAST */
    .toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; gap: 8px; align-items: center; }
    .toast { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; font-size: 13px; font-weight: 500; animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: #ff5050; color: #ff5050; }
    .toast.info { border-color: var(--accent); color: var(--accent); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

    /* SPINNER */
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-row { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 16px; color: var(--muted); font-size: 13px; }
    .empty-state { text-align: center; padding: 32px 20px; color: var(--muted); font-size: 14px; line-height: 1.6; }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }

    @media (max-width: 480px) {
      .main-content { padding: 20px 16px; }
      .topbar { padding: 14px 16px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- WELCOME -->
  <div class="screen active" id="screen-welcome">
    <div class="logo-area">
      <div class="mic-icon">🎤</div>
      <div class="app-title">KARAOKÉ</div>
      <div class="app-subtitle">Ajoute tes chansons à la playlist</div>
    </div>
    <div class="welcome-form">
      <div class="input-group">
        <label>Ton prénom</label>
        <input class="input-field" id="input-name" type="text" placeholder="Ex: Marie" autocomplete="off" maxlength="30" />
      </div>
      <button class="btn-primary" id="btn-start" disabled>C'est parti 🎶</button>
    </div>
  </div>

  <!-- ADMIN (connexion Google, toi seulement) -->
  <div class="screen" id="screen-admin">
    <div class="admin-card">
      <div class="admin-icon">🎛️</div>
      <div class="admin-badge">Mode Admin</div>
      <div class="admin-title">Connexion YouTube</div>
      <div class="admin-desc">Connecte ton compte Google une seule fois pour autoriser l'app à ajouter les chansons à ta playlist.</div>
      <button class="btn-primary" id="btn-oauth">Se connecter avec Google 🔐</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="screen" id="screen-main">
    <div class="topbar">
      <div class="topbar-brand">🎤 KARAOKÉ</div>
      <div class="topbar-user">
        <div class="user-avatar" id="avatar-initials">?</div>
        <div class="user-name" id="topbar-username">—</div>
      </div>
    </div>
    <div class="main-content">

      <div class="search-section">
        <div class="section-title">Cherche ta chanson</div>
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input class="search-field" id="search-input" type="text" placeholder="Titre, artiste…" autocomplete="off" />
        </div>
        <div id="search-results"></div>
      </div>

      <div class="divider">ou</div>

      <div class="manual-section">
        <div class="section-title">Ajouter manuellement</div>
        <div class="manual-form">
          <input class="input-field" id="manual-title" type="text" placeholder="Titre de la chanson" autocomplete="off" />
          <input class="input-field" id="manual-artist" type="text" placeholder="Artiste" autocomplete="off" />
          <button class="btn-secondary" id="btn-manual-add">Ajouter à la playlist ➕</button>
        </div>
      </div>

      <div class="my-songs-section" id="my-songs-section" style="display:none;">
        <div class="section-title">Mes chansons ajoutées</div>
        <div class="songs-list" id="songs-list"></div>
      </div>

    </div>
  </div>

</div>
<div class="toast-container" id="toast-container"></div>

<script>
const CONFIG = {
  apiKey: 'AIzaSyARSowOUckq_NbnFl3b2RnlU8QOcATdNug',
  clientId: '1031238692497-7jiuh5d0v4as084jkphisj0kgsqtj1hp.apps.googleusercontent.com',
  playlistId: 'PLzmpVmU1OuzfoDs9tXLT54-ipwGRX-GLQ',
  scopes: 'https://www.googleapis.com/auth/youtube',
  adminName: 'Mathieu', // Change si besoin
};

let state = {
  userName: '',
  accessToken: null,
  songs: [],
  searchTimeout: null,
};

// ── UTILS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function saveSongs() {
  localStorage.setItem(`karaoke_songs_${state.userName}`, JSON.stringify(state.songs));
}

function loadSongs() {
  try { return JSON.parse(localStorage.getItem(`karaoke_songs_${state.userName}`)) || []; } catch { return []; }
}

// ── TOKEN : stocké dans localStorage (partagé entre onglets/sessions sur même navigateur)
// L'admin se connecte une fois, le token est sauvegardé
function saveAdminToken(token) {
  localStorage.setItem('karaoke_admin_token', token);
}

function getAdminToken() {
  return localStorage.getItem('karaoke_admin_token');
}

// ── WELCOME ──
const inputName = document.getElementById('input-name');
const btnStart = document.getElementById('btn-start');

const savedName = localStorage.getItem('karaoke_user');
if (savedName) { inputName.value = savedName; btnStart.disabled = false; }

inputName.addEventListener('input', () => { btnStart.disabled = inputName.value.trim().length < 1; });
inputName.addEventListener('keydown', e => { if (e.key === 'Enter' && !btnStart.disabled) btnStart.click(); });

btnStart.addEventListener('click', () => {
  const name = inputName.value.trim();
  if (!name) return;
  state.userName = name;
  localStorage.setItem('karaoke_user', name);

  const token = getAdminToken();
  if (token) {
    state.accessToken = token;
    enterMain();
  } else {
    // Pas de token : soit l'admin doit se connecter, soit on attend
    // On vérifie si c'est l'admin
    if (name.toLowerCase() === CONFIG.adminName.toLowerCase()) {
      showScreen('screen-admin');
    } else {
      // Invité : on affiche un message d'attente
      toast("L'admin n'a pas encore configuré l'app. Dis à Mathieu de se connecter en premier !", 'error');
    }
  }
});

// ── OAUTH (admin seulement) ──
document.getElementById('btn-oauth').addEventListener('click', () => {
  const params = new URLSearchParams({
    client_id: CONFIG.clientId,
    redirect_uri: window.location.origin + window.location.pathname,
    response_type: 'token',
    scope: CONFIG.scopes,
    include_granted_scopes: 'true',
  });
  window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
});

function handleOAuthCallback() {
  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get('access_token');
    if (token) {
      saveAdminToken(token);
      state.accessToken = token;
      history.replaceState(null, '', window.location.pathname);
      const name = localStorage.getItem('karaoke_user');
      if (name) { state.userName = name; enterMain(); }
      else { showScreen('screen-welcome'); }
      toast('✅ Connexion Google réussie ! L\'app est prête.', 'success');
      return true;
    }
  }
  return false;
}

// ── MAIN ──
function enterMain() {
  document.getElementById('topbar-username').textContent = state.userName;
  document.getElementById('avatar-initials').textContent = state.userName.charAt(0).toUpperCase();
  state.songs = loadSongs();
  renderSongs();
  showScreen('screen-main');
}

// ── SEARCH ──
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  clearTimeout(state.searchTimeout);
  const q = searchInput.value.trim();
  if (q.length < 2) { searchResults.innerHTML = ''; return; }
  state.searchTimeout = setTimeout(() => searchYouTube(q), 500);
});

async function searchYouTube(query) {
  searchResults.innerHTML = `<div class="loading-row"><div class="spinner"></div> Recherche en cours…</div>`;
  try {
    const q = encodeURIComponent(query + ' karaoké');
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=5&q=${q}&key=${CONFIG.apiKey}`;
    const res = await fetch(url);
    const data = await res.json();
    if (!data.items || data.items.length === 0) {
      searchResults.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div>Aucun résultat.</div>`;
      return;
    }
    renderResults(data.items);
  } catch(e) {
    searchResults.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div>Erreur de recherche.</div>`;
  }
}

function renderResults(items) {
  const list = document.createElement('div');
  list.className = 'results-list';
  items.forEach(item => {
    const videoId = item.id.videoId;
    const title = item.snippet.title;
    const channel = item.snippet.channelTitle;
    const thumb = item.snippet.thumbnails?.default?.url || '';
    const el = document.createElement('div');
    el.className = 'result-item';
    el.innerHTML = `
      <img class="result-thumb" src="${thumb}" alt="" loading="lazy" />
      <div class="result-info">
        <div class="result-title">${escapeHtml(title)}</div>
        <div class="result-channel">${escapeHtml(channel)}</div>
      </div>
      <button class="result-add" title="Ajouter">+</button>
    `;
    el.querySelector('.result-add').addEventListener('click', e => { e.stopPropagation(); addSong({videoId,title,channel,thumb}); });
    el.addEventListener('click', () => addSong({videoId,title,channel,thumb}));
    list.appendChild(el);
  });
  searchResults.innerHTML = '';
  searchResults.appendChild(list);
}

// ── MANUAL ──
document.getElementById('btn-manual-add').addEventListener('click', async () => {
  const title = document.getElementById('manual-title').value.trim();
  const artist = document.getElementById('manual-artist').value.trim();
  if (!title) { toast('Entre au moins le titre de la chanson', 'error'); return; }
  toast('Recherche automatique en cours…', 'info');
  try {
    const q = encodeURIComponent(`${title} ${artist} karaoké`);
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=1&q=${q}&key=${CONFIG.apiKey}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.items && data.items.length > 0) {
      const item = data.items[0];
      await addSong({ videoId: item.id.videoId, title: item.snippet.title, channel: item.snippet.channelTitle, thumb: item.snippet.thumbnails?.default?.url || '' });
    } else {
      toast('Aucune vidéo trouvée', 'error');
    }
  } catch(e) { toast('Erreur lors de la recherche', 'error'); }
  document.getElementById('manual-title').value = '';
  document.getElementById('manual-artist').value = '';
});

// ── ADD TO PLAYLIST ──
async function addSong(song) {
  if (state.songs.find(s => s.videoId === song.videoId)) {
    toast('Cette chanson est déjà dans ta liste !', 'error'); return;
  }
  const entry = { ...song, status: 'adding', addedBy: state.userName, addedAt: Date.now() };
  state.songs.push(entry);
  saveSongs();
  renderSongs();
  searchInput.value = '';
  searchResults.innerHTML = '';
  toast('Ajout en cours… 🎵', 'info');
  try {
    await addToYouTubePlaylist(song.videoId);
    entry.status = 'done';
    saveSongs();
    renderSongs();
    toast(`✅ Ajoutée à la playlist !`, 'success');
  } catch(e) {
    entry.status = 'error';
    saveSongs();
    renderSongs();
    if (e.message === 'token_expired') {
      localStorage.removeItem('karaoke_admin_token');
      toast('Session expirée. Mathieu doit se reconnecter.', 'error');
    } else {
      toast('Erreur lors de l\'ajout à YouTube.', 'error');
    }
  }
}

async function addToYouTubePlaylist(videoId) {
  const token = getAdminToken();
  const res = await fetch('https://www.googleapis.com/youtube/v3/playlistItems?part=snippet', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ snippet: { playlistId: CONFIG.playlistId, resourceId: { kind: 'youtube#video', videoId } } })
  });
  if (!res.ok) {
    if (res.status === 401) throw new Error('token_expired');
    const err = await res.json();
    throw new Error(err.error?.message || 'YouTube API error');
  }
}

// ── RENDER SONGS ──
function renderSongs() {
  const section = document.getElementById('my-songs-section');
  const list = document.getElementById('songs-list');
  if (state.songs.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'flex';
  list.innerHTML = '';
  [...state.songs].reverse().forEach(song => {
    const el = document.createElement('div');
    el.className = 'song-item';
    const statusLabel = song.status === 'adding' ? '⏳ Ajout…' : song.status === 'done' ? '✅ Ajoutée' : '❌ Erreur';
    const statusClass = song.status === 'adding' ? 'adding' : song.status === 'done' ? 'done' : 'error';
    el.innerHTML = `
      ${song.thumb ? `<img class="song-thumb" src="${song.thumb}" alt="" />` : ''}
      <div class="song-info">
        <div class="song-title">${escapeHtml(song.title)}</div>
        <div class="song-meta">Ajouté par ${escapeHtml(song.addedBy)}</div>
      </div>
      <span class="song-status ${statusClass}">${statusLabel}</span>
    `;
    list.appendChild(el);
  });
}

// ── INIT ──
if (!handleOAuthCallback()) {
  const name = localStorage.getItem('karaoke_user');
  const token = getAdminToken();
  if (name && token) { state.userName = name; state.accessToken = token; enterMain(); }
  else { showScreen('screen-welcome'); }
}
</script>
